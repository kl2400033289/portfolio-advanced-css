<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <meta name="description"
          content="Contact Hemangini Palla">

    <meta name="theme-color"
          content="#222222">

    <title>
        Contact
    </title>

    <link rel="stylesheet"
          href="style.css">

</head>

<body>

    <a href="#main-content"
       class="skip-link">

       Skip to Main Content

    </a>

    <header>

        <nav aria-label="Main Navigation">

            <ul>

                <li>
                    <a href="index.html">
                        Home
                    </a>
                </li>

                <li>
                    <a href="projects.html">
                        Projects
                    </a>
                </li>

                <li>
                    <a href="contact.html">
                        Contact
                    </a>
                </li>

            </ul>

        </nav>

        <button id="theme-toggle">
            Dark Mode
        </button>

    </header>

    <main id="main-content">

        <section aria-labelledby="contact-heading">

            <h1 id="contact-heading">
                Contact Me
            </h1>

            <form aria-label="Contact Form">

                <label for="name">
                    Full Name
                </label>

                <input
                    type="text"
                    id="name"
                    required>

                <label for="email">
                    Email Address
                </label>

                <input
                    type="email"
                    id="email"
                    required>

                <label for="message">
                    Message
                </label>

                <textarea
                    id="message"
                    rows="5"
                    required>
                </textarea>

                <button type="submit">
                    Send Message
                </button>

            </form>

        </section>

    </main>

    <footer>

        <p>
            © 2026 Hemangini Palla
        </p>

    </footer>

    <script src="script.js"></script>

</body>

</html>
